# Example Agent VS — Helm chart values
#
# Uses hologram-generic-ai-agent-chart which bundles:
#   - Chatbot (with agent pack, LLM, RAG, MCP)
#   - VS Agent (DIDComm, wallet)
#   - Redis (vector store, memory, queues)
#   - PostgreSQL (session persistence)
#
# Deployment target: eafit.testnet.verana.network
chartSource: oci://registry-1.docker.io/io2060/hologram-generic-ai-agent-chart
chartVersion: v1.11.2

global:
  domain: eafit.testnet.verana.network

nameOverride: 'example-agent-chart'

# Credential definition ID for user authentication (injected from config.env by workflow)
credentialDefinitionId: ''

# === Redis ===
redis:
  enabled: true
  port: 6379
  image:
    pullPolicy: Always
  persistence:
    enabled: true
    mountPath: /data
    accessModes:
      - ReadWriteOnce
    size: 1Gi
  resources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '500m'
      memory: '512Mi'
  service:
    type: ClusterIP

# === PostgreSQL ===
postgres:
  enabled: true
  port: 5432
  image:
    pullPolicy: Always
  env:
    - name: PGDATA
      value: '/var/lib/postgresql/data/pgdata'
  secret:
    POSTGRES_PASSWORD: 'placeholder'
    POSTGRES_USER: 'example_agent_db'
    POSTGRES_DB: 'example-agent'
  resources:
    requests:
      cpu: '100m'
      memory: '128Mi'
    limits:
      cpu: '500m'
      memory: '512Mi'
  storage:
    size: 2Gi
    storageClassName: csi-cinder-high-speed
  service:
    type: ClusterIP

# === Chatbot ===
chatbot:
  replicas: 1
  image:
    pullPolicy: Always
  resources:
    requests:
      cpu: '200m'
      memory: '256Mi'
    limits:
      cpu: '1000m'
      memory: '512Mi'
  env:
    - name: APP_PORT
      value: '3003'
    - name: LOG_LEVEL
      value: '3'
    - name: LLM_PROVIDER
      value: 'openai'
    - name: OPENAI_MODEL
      value: 'llama-3.3-70b-versatile'
    - name: OPENAI_BASE_URL
      value: 'https://api.groq.com/openai/v1'
    - name: VECTOR_STORE
      value: 'redis'
    - name: VECTOR_INDEX_NAME
      value: 'example_agent'
    - name: RAG_PROVIDER
      value: 'langchain'
    - name: RAG_DOCS_PATH
      value: '/app/rag/docs'
    - name: AGENT_MEMORY_BACKEND
      value: 'redis'
    - name: AGENT_MEMORY_WINDOW
      value: '20'
    - name: REDIS_URL
      value: 'redis://example-agent-chart-redis.{{ .Release.Namespace }}:6379'
    - name: VS_AGENT_ADMIN_URL
      value: 'http://example-agent.{{ .Release.Namespace }}:3000'
    - name: POSTGRES_HOST
      value: 'example-agent-chart-postgres.{{ .Release.Namespace }}'
    - name: CREDENTIAL_DEFINITION_ID
      value: '{{ .Values.credentialDefinitionId | default "" }}'
    - name: GITHUB_MCP_URL
      value: 'https://api.githubcopilot.com/mcp/'
  agentPack:
    enabled: true
    name: example-agent
    mountPath: /app/agent-packs/example-agent
    fileName: agent-pack.yaml
    existingConfigMap: 'example-agent-agent-pack'
  secret:
    POSTGRES_PASSWORD: 'placeholder'
    POSTGRES_USER: 'example_agent_db'
    POSTGRES_DB_NAME: 'example-agent'
  service:
    type: ClusterIP
    port: 3003
  storage:
    size: 1Gi
    storageClassName: csi-cinder-high-speed
  ingress:
    enabled: false

# === Stats (disabled) ===
stats:
  enabled: false

# === Artemis (disabled) ===
artemis:
  enabled: false

# === VS Agent ===
vs-agent-chart:
  enabled: true
  name: example-agent
  didcommLabel: 'Example Agent'
  didcommInvitationImageUrl: 'https://hologram.zone/images/github.svg'
  eventsBaseUrl: http://example-agent-chart-chatbot:3003
  ingress:
    host: "example-agent.{{ .Values.global.domain }}"
    tlsSecret: "example-agent.{{ .Values.global.domain }}-cert"
    public:
      enableCors: true
    private:
      whitelistSourceRange: ""
      host: ""
  extraEnv:
    - name: AGENT_WALLET_ID
      value: "Example Agent"
    - name: USE_CORS
      value: "true"
    - name: REDIS_HOST
      value: "example-agent-chart-redis"
    - name: AGENT_LOG_LEVEL
      value: "3"
    - name: SELF_ISSUED_VTC_ORG_TYPE
      value: "PRIVATE"
    - name: SELF_ISSUED_VTC_ORG_COUNTRYCODE
      value: "CO"
    - name: SELF_ISSUED_VTC_ORG_ADDRESS
      value: "Medellin, Colombia"
    - name: SELF_ISSUED_VTC_SERVICE_TYPE
      value: "AI Agent"
    - name: SELF_ISSUED_VTC_SERVICE_DESCRIPTION
      value: "Example AI agent for the EAFIT Challenge"
    - name: SELF_ISSUED_VTC_SERVICE_MINIMUMAGEREQUIRED
      value: "1"
