# =============================================================================
# Example Agent VS — Local Docker Compose
# =============================================================================
#
# Runs the full Example Agent stack locally:
#   - VS Agent (DIDComm, wallet)
#   - Chatbot (hologram-generic-ai-agent)
#   - Redis (vector store, memory, queues)
#   - PostgreSQL (session persistence)
#
# Prerequisites:
#   - Docker and Docker Compose installed
#   - ngrok running on port 3011
#   - OPENAI_API_KEY set in environment
#
# Usage:
#   set -a && source config.env && set +a
#   export NGROK_DOMAIN=your-domain.ngrok-free.app
#   export OPENAI_API_KEY=sk-...
#   docker compose -f docker/docker-compose.yml up
#
# =============================================================================

services:
  vs-agent:
    image: ${VS_AGENT_IMAGE:-veranalabs/vs-agent:latest}
    platform: linux/amd64
    ports:
      - "${VS_AGENT_ADMIN_PORT:-3010}:3000"
      - "${VS_AGENT_PUBLIC_PORT:-3011}:3001"
    environment:
      - AGENT_PUBLIC_DID=did:webvh:${NGROK_DOMAIN}
      - AGENT_LABEL=${SERVICE_NAME:-Example Agent}
      - AGENT_INVITATION_IMAGE_URL=${SERVICE_LOGO_URL:-https://hologram.zone/images/github.svg}
      - ENABLE_PUBLIC_API_SWAGGER=true
      - EVENTS_BASE_URL=http://chatbot:${CHATBOT_PORT:-3003}
      - REDIS_HOST=redis
      - USE_CORS=true
      - AGENT_LOG_LEVEL=3
    volumes:
      - vs-agent-data:/root/.afj
    depends_on:
      - redis

  redis:
    image: redis/redis-stack-server:latest
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data

  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_DB=${POSTGRES_DB:-example-agent}
      - POSTGRES_USER=${POSTGRES_USER:-example_agent_db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - PGDATA=/var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data

  chatbot:
    image: ${CHATBOT_IMAGE:-io2060/hologram-generic-ai-agent-app:v1.11.2}
    platform: linux/amd64
    ports:
      - "${CHATBOT_PORT:-3003}:${CHATBOT_PORT:-3003}"
    environment:
      - APP_PORT=${CHATBOT_PORT:-3003}
      - LOG_LEVEL=3
      - LLM_PROVIDER=${LLM_PROVIDER:-openai}
      - OPENAI_MODEL=${OPENAI_MODEL:-gpt-5.4-mini}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - VECTOR_STORE=redis
      - VECTOR_INDEX_NAME=example_agent
      - RAG_PROVIDER=langchain
      - RAG_DOCS_PATH=/app/rag/docs
      - AGENT_MEMORY_BACKEND=redis
      - AGENT_MEMORY_WINDOW=20
      - REDIS_URL=redis://redis:6379
      - VS_AGENT_ADMIN_URL=http://vs-agent:3000
      - POSTGRES_HOST=postgres
      - POSTGRES_USER=${POSTGRES_USER:-example_agent_db}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-changeme}
      - POSTGRES_DB_NAME=${POSTGRES_DB:-example-agent}
      - CREDENTIAL_DEFINITION_ID=${CREDENTIAL_DEFINITION_ID}
      - GITHUB_MCP_URL=${GITHUB_MCP_URL:-https://api.githubcopilot.com/mcp/}
      - MCP_CONFIG_ENCRYPTION_KEY=${MCP_CONFIG_ENCRYPTION_KEY:-}
    volumes:
      - chatbot-data:/app/data
      - ../agent-pack.yaml:/app/agent-packs/example-agent/agent-pack.yaml:ro
    depends_on:
      - vs-agent
      - redis
      - postgres

volumes:
  vs-agent-data:
  redis-data:
  postgres-data:
  chatbot-data:
